<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

    <title>Diamond CRM Inquiry Form</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:20px;
        }

        .form-container{
            background:#ffffff;
            width:100%;
            max-width:700px;
            padding:40px;
            border-radius:16px;
            box-shadow:0 10px 25px rgba(0,0,0,0.1);
        }

        .form-title{
            text-align:center;
            margin-bottom:30px;
        }

        .form-title h1{
            font-size:32px;
            color:#1f2937;
            margin-bottom:10px;
        }

        .form-title p{
            color:#6b7280;
            font-size:15px;
        }

        .form-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:20px;
        }

        .full-width{
            grid-column:1 / -1;
        }

        .form-group{
            display:flex;
            flex-direction:column;
        }

        label{
            margin-bottom:8px;
            font-weight:600;
            color:#374151;
            font-size:14px;
        }

        input,
        select,
        textarea{
            padding:12px;
            border:1px solid #d1d5db;
            border-radius:10px;
            font-size:14px;
            outline:none;
            transition:0.3s;
        }

        input:focus,
        select:focus,
        textarea:focus{
            border-color:#2563eb;
            box-shadow:0 0 0 3px rgba(37,99,235,0.1);
        }

        textarea{
            resize:none;
        }

        .submit-btn{
            width:100%;
            background:#2563eb;
            color:white;
            border:none;
            padding:14px;
            border-radius:10px;
            font-size:16px;
            cursor:pointer;
            margin-top:25px;
            transition:0.3s;
        }

        .submit-btn:hover{
            background:#1d4ed8;
        }

        @media(max-width:768px){

            .form-grid{
                grid-template-columns:1fr;
            }

        }

    </style>

</head>

<body>

<div class="form-container">

    <div class="form-title">
        <h1>Product Inquiry</h1>
        <p>Fill out the form and our team will contact you shortly.</p>
    </div>

    <form action="https://test.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8&orgId=00DIm000000LPS5" method="POST">

        <input type="hidden" name="oid" value="00DIm000000LPS5">

        <input type="hidden" name="retURL" value="https://google.com">

        <div class="form-grid">

            <div class="form-group">
                <label>First Name</label>
                <input id="first_name" maxlength="40" name="first_name" type="text">
            </div>

            <div class="form-group">
                <label>Last Name</label>
                <input id="last_name" maxlength="80" name="last_name" type="text" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input id="email" maxlength="80" name="email" type="email">
            </div>

            <div class="form-group">
                <label>Phone</label>
                <input id="phone" maxlength="40" name="phone" type="text">
            </div>

            <div class="form-group full-width">
                <label>Interested Product Category</label>

                <select id="00NIm000002RHuS" multiple="multiple" name="00NIm000002RHuS">

                    <option value="Hand Knotted Rugs">Hand Knotted Rugs</option>
                    <option value="Modern Rugs">Modern Rugs</option>
                    <option value="Designer Rugs">Designer Rugs</option>
                    <option value="Flat Weave Rugs">Flat Weave Rugs</option>
                    <option value="Wool Rugs">Wool Rugs</option>
                    <option value="Cotton Rugs">Cotton Rugs</option>
                    <option value="Carpets">Carpets</option>
                    <option value="Cushion Covers">Cushion Covers</option>
                    <option value="Poufs">Poufs</option>
                    <option value="Home Furnishing">Home Furnishing</option>

                </select>
            </div>

            <div class="form-group">
                <label>Preferred Material</label>

                <select id="00NIm000002RHuc" name="00NIm000002RHuc">

                    <option value="">--None--</option>
                    <option value="Wool">Wool</option>
                    <option value="Cotton">Cotton</option>
                    <option value="Jute">Jute</option>
                    <option value="Silk">Silk</option>
                    <option value="Polyester">Polyester</option>
                    <option value="Viscose">Viscose</option>
                    <option value="Bamboo Silk">Bamboo Silk</option>
                    <option value="Leather">Leather</option>
                    <option value="Blended Fabric">Blended Fabric</option>

                </select>
            </div>

            <div class="form-group">
                <label>Preferred Size</label>
                <input id="00NIm000002RHuw" maxlength="255" name="00NIm000002RHuw" type="text">
            </div>

            <div class="form-group">
                <label>Preferred Color Theme</label>
                <input id="00NIm000002RHv1" maxlength="255" name="00NIm000002RHv1" type="text">
            </div>

            <div class="form-group">
                <label>Quantity Requirement</label>
                <input id="00NIm000002RHum" name="00NIm000002RHum" type="number">
            </div>

            <div class="form-group full-width">
                <label>Requirement Details</label>

                <textarea id="00NIm000002RHuh"
                          name="00NIm000002RHuh"
                          rows="5"></textarea>
            </div>

        </div>

        <button class="submit-btn" type="submit">
            Submit Inquiry
        </button>

    </form>

</div>

</body>
</html>
